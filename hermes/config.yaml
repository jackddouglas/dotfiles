model:
  default: "deepseek/deepseek-v4-flash"
  provider: "openrouter"

# Tavily handles both search and single-page extract.
web:
  search_backend: "tavily"
  extract_backend: "tavily"

# Tool commands run on this machine; dangerous ones require manual approval
# (delivered as Telegram approval buttons).
terminal:
  backend: "local"

security:
  redact_secrets: true
  approvals:
    mode: "manual"

agent:
  reasoning_effort: "medium"

# Route side-LLM tasks to a cheap model (uses the existing OpenRouter key).
# Embedding is intentionally omitted until semantic memory/search is enabled.
auxiliary:
  vision:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"
  compression:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"
  curator:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"
  title:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"
  session_search:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"
  web_extract:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"

# Read-only access to the Obsidian vault via the filesystem MCP server.
# Only read tools are exposed (tools.include); no write/edit/create/move.
mcp_servers:
  vault:
    command: npx
    args:
    - '@modelcontextprotocol/server-filesystem'
    - /Users/jackdouglas/Library/Mobile Documents/iCloud~md~obsidian/Documents/JDD
    env:
      npm_config_yes: 'true'
    tools:
      include:
      - read_file
      - read_text_file
      - read_media_file
      - read_multiple_files
      - list_directory
      - list_directory_with_sizes
      - directory_tree
      - search_files
      - get_file_info
      - list_allowed_directories
    enabled: true
